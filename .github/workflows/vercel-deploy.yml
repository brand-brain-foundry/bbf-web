name: Vercel Production Deploy

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: pnpm add --global vercel@latest

      - name: Pull Vercel Environment Information + Diagnostic
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          echo "=== DIAGNOSTIC: env vars file (names + value lengths only) ==="
          while IFS='=' read -r name value || [ -n "$name" ]; do
            if [[ -n "$name" && ! "$name" =~ ^# ]]; then
              stripped="${value%\"}"
              stripped="${stripped#\"}"
              len=${#stripped}
              echo "$name: length=$len"
            fi
          done < .vercel/.env.production.local
          echo "=== END DIAGNOSTIC ==="

      - name: Export Vercel env vars to GITHUB_ENV
        run: |
          while IFS= read -r line || [ -n "$line" ]; do
            if [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]]; then
              continue
            fi
            if [[ "$line" =~ ^([A-Z_][A-Z0-9_]*)=(.*)$ ]]; then
              name="${BASH_REMATCH[1]}"
              value="${BASH_REMATCH[2]}"
              value="${value%\"}"
              value="${value#\"}"
              value="${value%\'}"
              value="${value#\'}"
              {
                echo "${name}<<EOF_VERCEL_ENV"
                echo "${value}"
                echo "EOF_VERCEL_ENV"
              } >> "$GITHUB_ENV"
            fi
          done < .vercel/.env.production.local
          echo "Exported $(grep -c '^[A-Z_]' .vercel/.env.production.local) env vars to GITHUB_ENV"

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
