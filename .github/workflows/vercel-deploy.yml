name: Vercel Production Deploy

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: pnpm add --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Export Vercel env vars to GITHUB_ENV
        run: |
          # Read each line of .vercel/.env.production.local
          # Skip comments and empty lines
          # Strip surrounding quotes from values
          # Write to GITHUB_ENV so subsequent steps inherit
          while IFS= read -r line || [ -n "$line" ]; do
            # Skip empty lines and comments
            if [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]]; then
              continue
            fi
            # Extract var name and value
            if [[ "$line" =~ ^([A-Z_][A-Z0-9_]*)=(.*)$ ]]; then
              name="${BASH_REMATCH[1]}"
              value="${BASH_REMATCH[2]}"
              # Strip surrounding double quotes if present
              value="${value%\"}"
              value="${value#\"}"
              # Strip surrounding single quotes if present
              value="${value%\'}"
              value="${value#\'}"
              # Write to GITHUB_ENV using multiline delimiter to handle special chars
              {
                echo "${name}<<EOF_VERCEL_ENV"
                echo "${value}"
                echo "EOF_VERCEL_ENV"
              } >> "$GITHUB_ENV"
            fi
          done < .vercel/.env.production.local
          echo "Exported $(grep -c '^[A-Z_]' .vercel/.env.production.local) env vars to GITHUB_ENV"

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
